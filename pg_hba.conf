# ============================================================================
# PostgreSQL Client Authentication - pg_hba.conf (Produção Docker Segura)
# Banco só interno + acesso via SSH tunnel
# ============================================================================

# 1. CONEXÕES LOCAIS (Unix socket) - Dentro do container
# Só o usuário postgres do sistema pode conectar sem senha
local   all             postgres                                peer

# Demais usuários locais precisam de senha (evita abuso se alguém rodar código dentro do container)
local   all             all                                     scram-sha-256

# 2. LOCALHOST (útil para SSH tunnel e ferramentas dentro do container)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# 3. REDE DOCKER INTERNA - RESTRITO POR USUÁRIO
# Substitua pelos nomes reais dos usuários que você criou para cada aplicação

# auth
host    all             auth_app       172.17.0.0/16           scram-sha-256
host    all             auth_app       172.18.0.0/16           scram-sha-256

# bot-financas
host    all             bot_financas_app       172.17.0.0/16           scram-sha-256
host    all             bot_financas_app       172.18.0.0/16           scram-sha-256

# Exemplo: Aplicação 3 (se tiver)
# host    all             app3_user       172.17.0.0/16           scram-sha-256
# host    all             app3_user       172.18.0.0/16           scram-sha-256

# Usuário de leitura (se você criou um readonly_user)
# host    all             readonly_user   172.17.0.0/16           scram-sha-256
# host    all             readonly_user   172.18.0.0/16           scram-sha-256

# 4. ACESSO VIA SSH TUNNEL (DBeaver da sua máquina)
# Coloque o IP da sua VPS aqui (ou mantenha só 127.0.0.1 se o túnel for feito localmente)
host    all             all             66.94.99.245/32        scram-sha-256

# 5. BLOQUEIO TOTAL DE QUALQUER OUTRA CONEXÃO
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject