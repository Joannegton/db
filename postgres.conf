# ============================================================================
# PostgreSQL Configuration - postgres.conf
# ============================================================================
# Configurações otimizadas para desenvolvimento/produção

# ===========================================
# CONEXÕES E AUTENTICAÇÃO
# ===========================================

max_connections = 100

superuser_reserved_connections = 10

# Encriptação de senhas (SCRAM-SHA-256 é mais seguro)
password_encryption = scram-sha-256

# ===========================================
# PERFORMANCE - MEMÓRIA
# ===========================================

# ⚠️ VERIFICAR SEU AMBIENTE ANTES DE USAR ESTES VALORES!
# Dados atuais: shared_buffers = 1GB, effective_cache_size = 4GB
# Isso é seguro APENAS se sua VPS tiver ≥8GB RAM
#
# Se sua VPS tiver <8GB RAM, use isto:
#   shared_buffers = 256MB
#   effective_cache_size = 1GB
#   work_mem = 2MB
#   maintenance_work_mem = 128MB
#
# CÁLCULO SEGURO:
# - shared_buffers: 25% da RAM total (máx 40% em servidor dedicado)
# - effective_cache_size: 50-75% da RAM total
# - Deixa sempre 1-2GB para OS + microserviços

# Buffer compartilhado do PostgreSQL
# 25% da RAM total (8GB RAM → 2GB, 4GB RAM → 1GB)
shared_buffers = 1GB

# Cache efetivo para query planning (usado pelo EXPLAIN ANALYZE)
# 8GB RAM (compartilhado) → 4GB (deixa 2GB para microserviços + OS)
effective_cache_size = 4GB

wal_buffers = 16MB

# ===========================================
# WORK MEMORY (Operações de Sort/Hash)
# ===========================================

# work_mem * max_connections = máximo de RAM em operações
# Em VPS com microserviços: reduzir conservadoramente
# 4MB * 100 conexões = 400MB (deixa margem para apps)
work_mem = 4MB 

# Memória para manutenção (VACUUM, CREATE INDEX, ALTER TABLE, etc)
# Alto aqui = VACUUM/CREATE INDEX mais rápido (não afeta queries normais)
# Em VPS: reduzido para não competir com microserviços
# 256MB é seguro, balanceado
maintenance_work_mem = 256MB

# ===========================================
# I/O E PLANEJADOR
# ===========================================

# I/O concorrente (SSDs/NVMe suportam 200-500)
# HDDs → 50-100 | SSDs → 200-500
effective_io_concurrency = 200

# Custo de acesso aleatório (SSD = 1.1, HDD = 4.0)
# Se usar HDD, mude para 4.0
random_page_cost = 1.1

# Habilitar JIT (Just-In-Time compilation) - PostgreSQL 11+
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000

# ===========================================
# LOGGING
# ===========================================

# Nível de log
# ⚠️ NOTA: log_level NÃO EXISTE no PostgreSQL
# PostgreSQL usa: log_min_messages = (debug5|debug4|debug3|debug2|debug1|info|notice|warning|error|log|fatal|panic)
# Deixamos isso configurável via docker-compose ou variáveis de ambiente
# Padrão: notice (bom para produção)

# Habilitar logging
logging_collector = on
# 
log_destination = 'stderr'

# Conexões
log_connections = on
log_disconnections = on

# Statements que causam lock
log_lock_waits = on

# Checkpoints (útil para diagnóstico de performance)
log_checkpoints = on

# Autovacuum (logar tudo com 0, ou só > 250ms)
log_autovacuum_min_duration = 250

# Diretório de logs
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 100MB

# O que logar
log_connections = on
log_disconnections = on
log_duration = off

# Queries lentas - logar TUDO que demora >1000ms (1 segundo)
# Use 500 para ser mais agressivo (detecta queries >0.5s)
# Use -1 para desabilitar (valor padrão)
log_min_duration_statement = 1000

# Tipos de statement a logar:
# - 'none':  não loga nenhum statement (default)
# - 'ddl':   loga CREATE, ALTER, DROP (recomendado - gera pouco ruído)
# - 'dml':   loga DDL + INSERT, UPDATE, DELETE
# - 'all':   loga TUDO (cuidado com volume de logs!)
log_statement = 'ddl'

# Erros
log_min_error_statement = error

# Formato dos logs - inclui timestamp, PID, usuário, banco, app, IP cliente
# %t = ISO 8601 timestamp (melhor para parsing)
# %p = Process ID
# %l = Log level
# %u = User
# %d = Database
# %a = Application name
# %h = Client hostname/IP
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ===========================================
# CHECKPOINTS (Sincronização com Disco)
# ===========================================

# Intervalo entre checkpoints (15-30min reduz checkpoint spikes)
# Valores altos = menos I/O, mas recovery mais lento
checkpoint_timeout = 15min

# Tamanho do WAL antes de forçar checkpoint
# Aumentado para reduzir checkpoints frequentes
# 4-16GB depende do volume de escrita. Aumente se tiver muitas escritas
max_wal_size = 4GB

# Tamanho mínimo do WAL (não mude muito)
min_wal_size = 256MB

# ===========================================
# AUTOVACUUM
# ===========================================

# Ativar autovacuum
autovacuum = on

# Frequência de autovacuum (reativo = bom)
autovacuum_naptime = '10s'

# Limiar para autovacuum (usar padrão ou tunar por tabela)
# Padrão do PG é suficiente para maioria dos casos
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Múltiplos workers (acelera vacuum em tabelas grandes)
# Em VPS: reduzido a 2 para não competir com microserviços por CPU
# 2 workers é bom balanço
autovacuum_max_workers = 2

# Cost limit (1000-2000 em I/O bom, 100 em I/O ruim)
# Aumentar = autovacuum mais agressivo (mais rápido)
# Diminuir = menos impacto em queries (mais lento)
autovacuum_vacuum_cost_limit = 1000

autovacuum_vacuum_scale_factor = 0.1

# Para tunar por tabela (exemplo):
# ALTER TABLE sua_tabela SET (autovacuum_vacuum_scale_factor = 0.05);

# ===========================================
# ÍNDICES E CONSTRAINTS
# ===========================================

# Validar constraints depois de COPY
constraint_exclusion = partition

# Enable index scans
enable_indexscan = on

# ===========================================
# REPLICAÇÃO (para standby)
# ===========================================

# WAL Level necessário para replicação
wal_level = replica

# Máximo de replicadores conectados
max_wal_senders = 3

# WAL keep size (para replicadores atrasados)
wal_keep_size = 1GB

# ===========================================
# SINCRONIZAÇÃO (ACID)
# ===========================================

# Forçar sincronização a disco (mais seguro, mais lento)
fsync = on

# Sincronização durante WAL write
wal_sync_method = 'fdatasync'

# ===========================================
# STATEMENT TIMEOUT (Proteção contra queries longas)
# ===========================================

# Timeout padrão (30 segundos)
statement_timeout = 30000

# Idle timeout (5 minutos)
idle_in_transaction_session_timeout = 300000

# ===========================================
# NOTIFICAÇÕES
# ===========================================

# Buffer para notificações
notify_sequester_buffer_mb = 10

checkpoint_completion_target = 0.9     # checkpoints mais suaves

# Parallelismo (bom se tiver queries analíticas)
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
max_parallel_workers = 2               # ajuste conforme vCPUs

# Segurança extra
ssl = off                              # OK (Docker interno + SSH)
log_hostname = on                      # ajuda a identificar de onde vem conexões

# Para evitar queries muito pesadas
max_locks_per_transaction = 128        # se usar muitas FKs ou particionamento

# ===========================================
# AJUSTES POR AMBIENTE E WORKLOAD
# ===========================================

# Servidor pequeno (2-4GB RAM):
#   shared_buffers = 512MB
#   effective_cache_size = 1GB
#   work_mem = 2MB
#   maintenance_work_mem = 128MB

# Servidor médio (8-16GB RAM):  ← CONFIGURAÇÃO ATUAL
#   shared_buffers = 4GB
#   effective_cache_size = 12GB
#   work_mem = 4MB
#   maintenance_work_mem = 512MB

# Servidor grande (32GB+ RAM):
#   shared_buffers = 8GB
#   effective_cache_size = 24GB
#   work_mem = 16-64MB
#   maintenance_work_mem = 1GB
#   autovacuum_max_workers = 6

# OLTP (muitas transações curtas) - PADRÃO:
#   checkpoint_timeout = 15min
#   max_wal_size = 4GB
#   autovacuum_vacuum_cost_limit = 1000

# OLAP (muitas leituras pesadas):
#   work_mem = 64MB (ou mais)
#   effective_io_concurrency = 500
#   max_parallel_workers_per_gather = 4

# Monitoramento essencial:
# 1. SELECT * FROM pg_stat_statements; (queries lentas)
# 2. SELECT * FROM pg_stat_user_tables; (tabelas que precisam vacuum)
# 3. SELECT * FROM pg_stat_activity; (conexões ativas)
# 4. Logs: grep "autovacuum" postgresql.log | grep duration

# ===========================================
# COMO USAR OS LOGS (Monitoramento Prático)
# ===========================================

# 1. Ver logs em tempo real:
#    docker-compose -f db/docker-compose.postgres.yml logs -f postgres
#
# 2. Ver logs salvos:
#    tail -f db/logs/postgresql-*.log
#
# 3. Filtrar por tipo:
#    grep "autovacuum" db/logs/postgresql-*.log         (autovacuum events)
#    grep "duration:" db/logs/postgresql-*.log          (queries lentas)
#    grep "ERROR" db/logs/postgresql-*.log              (erros)
#    grep "connection" db/logs/postgresql-*.log         (conexões/desconexões)
#    grep "checkpoint" db/logs/postgresql-*.log         (checkpoints)
#
# 4. Análise com awk:
#    grep "duration:" db/logs/postgresql-*.log | awk '{print $NF}' | sort -n | tail -20
#    (mostra as 20 queries mais lentas)

# ===========================================
# DEVELOPMENT/DEBUG (comentar em produção)
# ===========================================

# Mostrar parsed queries (MUITO VERBOSO - só para debug)
# debug_print_parse = on
# debug_print_plan = on
# debug_print_rewritten = on
